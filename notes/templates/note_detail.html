{% extends "layout.html" %}

{% block title %}
Note Detail
{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto bg-white p-6 rounded-2xl shadow-md">

    <!-- Name -->
    <h1 class="text-2xl font-bold text-gray-900 mb-2">
        {{ note.name }}
    </h1>

    <!-- Date -->
    <p class="text-sm text-gray-500 mb-4">
        Created at: {{ note.created_At }}
    </p>

    <!-- Description -->
    <p class="text-gray-700 leading-relaxed">
        {{ note.description }}
    </p>

    <!-- Back Button -->
    <a href="{% url 'testing_notes' %}" 
       class="inline-block mt-6 bg-gray-800 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition">
        ← Back to Notes
    </a>

</div>

{% endblock %}
